<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Increase Team</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#060608;--white:#f0ede8;--acid:#b8ff2e;--steel:#1a1a24;--muted:#5a5a6e;--err:#ff5e5e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
body::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(184,255,46,.05) 0%,transparent 70%);pointer-events:none}
a{color:var(--acid);text-decoration:none}

.auth-container{width:100%;max-width:420px;position:relative;z-index:1}
.auth-logo{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;text-align:center;margin-bottom:48px}
.auth-logo span{color:var(--acid)}
.auth-logo a{color:inherit}

.auth-card{background:var(--steel);border:1px solid rgba(255,255,255,.06);padding:48px 40px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acid)}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:36px;text-align:center;margin-bottom:8px}
.auth-subtitle{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:36px}

.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:32px}
.tab{flex:1;padding:12px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--acid);border-bottom-color:var(--acid)}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;padding:14px 16px;background:var(--black);border:1px solid rgba(255,255,255,.1);color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .3s}
.form-group input:focus{border-color:var(--acid)}
.form-group input::placeholder{color:var(--muted);opacity:.6}

.btn{width:100%;padding:16px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-primary{background:var(--acid);color:var(--black)}
.btn-primary:hover{background:#d4ff6e}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.divider span{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

.btn-google{width:100%;padding:14px;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--white);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--acid);color:var(--acid)}

.msg{font-family:'Space Mono',monospace;font-size:11px;text-align:center;margin-top:16px;padding:12px;display:none}
.msg.error{display:block;color:var(--err);background:rgba(255,94,94,.08);border:1px solid rgba(255,94,94,.15)}
.msg.success{display:block;color:var(--acid);background:rgba(184,255,46,.08);border:1px solid rgba(184,255,46,.15)}

.auth-footer{text-align:center;margin-top:24px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em}
.auth-footer a{color:var(--acid)}

#signup-form{display:none}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo"><a href="index.html">INCREASE<span>.</span>TEAM</a></div>

  <div class="auth-card">
    <div class="auth-title">Bem-vindo</div>
    <div class="auth-subtitle">Acesse sua diretoria de IA</div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Entrar</button>
      <button class="tab" onclick="showTab('signup')">Criar conta</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="Sua senha" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Entrar</button>
      <div class="divider"><span>ou</span></div>
      <button type="button" class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="signup-name" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="signup-password" placeholder="Minimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" id="signup-btn">Criar conta</button>
      <div class="divider"><span>ou</span></div>
      <button type="button" class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>
    </form>

    <div id="auth-msg" class="msg"></div>
  </div>

  <div class="auth-footer">
    <a href="index.html">&larr; Voltar para o site</a>
  </div>
</div>

<script>
// SUPABASE CONFIG — substituir pelas credenciais reais
const SUPABASE_URL = 'https://tsrnlkhauvqqpdorxgwj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_l4-y94R6iumaJD4GI_h78Q_LG7sVxor';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check if already logged in
(async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const profile = await getProfile(session.user.id);
    if (profile && profile.company_name) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'onboarding.html';
    }
  }
})();

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('auth-msg').className = 'msg';
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('signup-form').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('signup-form').style.display = 'block';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function getProfile(userId) {
  const { data } = await supabase
    .from('profiles')
    .select('company_name')
    .eq('id', userId)
    .single();
  return data;
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg(error.message === 'Invalid login credentials'
      ? 'Email ou senha incorretos.'
      : error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  const profile = await getProfile(data.user.id);
  if (profile && profile.company_name) {
    window.location.href = 'dashboard.html';
  } else {
    window.location.href = 'onboarding.html';
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'Criando...';

  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: { full_name: name } }
  });

  if (error) {
    showMsg(error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Criar conta';
    return;
  }

  if (data.user && !data.session) {
    showMsg('Conta criada! Verifique seu e-mail para confirmar.', 'success');
    btn.disabled = false;
    btn.textContent = 'Criar conta';
  } else {
    window.location.href = 'onboarding.html';
  }
}

async function handleGoogle() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/onboarding.html' }
  });
}
</script>

</body>
</html>
